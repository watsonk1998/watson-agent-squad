name: Repo Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  repo-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure ripgrep is available
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Run doctor checks
        run: ./scripts/doctor.sh

      - name: Run sanitize scan
        run: ./scripts/sanitize_scan.sh
